spring:
  application:
    name: agentreproxy

  # SQLite 数据源配置（关键：无此配置服务无法启动）
  datasource:
    url: jdbc:sqlite:admin.db
    driver-class-name: org.sqlite.JDBC

  # 自动执行 schema.sql 初始化表结构
  sql:
    init:
      mode: always

  # WebFlux 内存缓冲阈值:与 application.yml 保持一致(25MB)。
  # 路径在 Spring 3.5 改为 spring.http.codecs.*(旧 spring.codec.* 已弃用)。
  http:
    codecs:
      max-in-memory-size: 25MB

# Docker 环境配置
server:
  port: 8351

# 模型列表外部配置（Docker 场景下通常通过环境变量 / mount 进来的 volume 覆盖）
#   - 留空字符串表示强制回退到 classpath 内置
#   - 也可写成 /etc/agentreproxy/modelsConfig.json,通过 -v 挂载进来
models:
  config:
    path: ./modelsConfig.json
