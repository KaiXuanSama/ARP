spring:
  application:
    name: agentreproxy
  # SQLite 数据源（位于项目根目录）
  datasource:
    url: ${SQLITE_URL:jdbc:sqlite:${user.dir}/agentreproxy.db?journal_mode=WAL&busy_timeout=5000}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 10
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  # WebFlux 内存缓冲阈值:与 application.yml 保持一致(25MB)。
  # 路径在 Spring 3.5 改为 spring.http.codecs.*(旧 spring.codec.* 已弃用)。
  http:
    codecs:
      max-in-memory-size: 25MB

# Docker 环境配置
server:
  port: 8351

# 模型列表外部配置（Docker 场景下通常通过环境变量 / mount 进来的 volume 覆盖）
#   - 留空字符串表示强制回退到 classpath 内置
#   - 也可写成 /etc/agentreproxy/modelsConfig.json,通过 -v 挂载进来
models:
  config:
    path: ${MODELS_CONFIG_PATH:./modelsConfig.json}
